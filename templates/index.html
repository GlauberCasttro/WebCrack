<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deep GitHub Analyzer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<!-- marked.js para renderizar Markdown -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
  :root {
    --bg:      #0d0d1a;
    --bg2:     #13132b;
    --bg3:     #1a1a35;
    --bg4:     #22224a;
    --accent:  #7c6af7;
    --accent2: #a78bfa;
    --accent3: #c4b5fd;
    --green:   #4ade80;
    --amber:   #fbbf24;
    --red:     #f87171;
    --fg:      #e2e8f0;
    --fg2:     #94a3b8;
    --fg3:     #64748b;
    --border:  #2a2a50;
    --glow:    0 0 20px rgba(124,106,247,0.35);
    --font-ui:   'Space Grotesk', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--fg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  .logo { font-size: 20px; font-weight: 700; color: var(--accent2); letter-spacing: -0.5px; }
  .logo span { color: var(--fg2); font-weight: 400; font-size: 13px; margin-left: 8px; }
  #status-bar {
    margin-left: auto;
    font-size: 12px;
    color: var(--fg3);
    font-family: var(--font-mono);
    transition: color 0.3s;
  }
  #status-bar.warn { color: var(--amber); }
  #status-bar.err  { color: var(--red); }
  #status-bar.ok   { color: var(--green); }

  /* ── Main layout ── */
  main {
    display: grid;
    grid-template-columns: 300px 1fr;
    flex: 1;
    overflow: hidden;
  }

  /* ── Left panel ── */
  aside {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-title {
    padding: 16px 18px 8px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--fg3);
  }
  .search-wrap { padding: 0 12px 12px; display: flex; gap: 8px; }

  input[type="text"] {
    flex: 1;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--fg);
    font-family: var(--font-ui);
    font-size: 13px;
    padding: 9px 13px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,106,247,0.2);
  }
  input[type="text"]::placeholder { color: var(--fg3); }

  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: var(--font-ui);
    font-weight: 600;
    font-size: 13px;
    padding: 9px 16px;
    cursor: pointer;
    transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    white-space: nowrap;
  }
  .btn:hover  { background: var(--accent2); box-shadow: var(--glow); }
  .btn:active { transform: scale(0.97); }
  .btn:disabled { background: var(--bg4); color: var(--fg3); cursor: not-allowed; box-shadow: none; transform: none; }

  /* Repo list */
  #repo-list {
    flex: 1;
    overflow-y: auto;
    padding: 0 8px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg4) transparent;
  }
  .repo-item {
    padding: 10px 12px;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.15s;
    border: 1px solid transparent;
    margin-bottom: 4px;
  }
  .repo-item:hover  { background: var(--bg3); }
  .repo-item.active { background: var(--bg4); border-color: var(--accent); }
  .repo-name { font-size: 13px; font-weight: 600; color: var(--fg); }
  .repo-meta { font-size: 11px; color: var(--fg3); margin-top: 2px; font-family: var(--font-mono); }
  .repo-desc { font-size: 11px; color: var(--fg2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .star { color: var(--amber); }

  .analyze-wrap { padding: 12px; border-top: 1px solid var(--border); }
  #analyze-btn  { width: 100%; }

  /* Sessions list */
  .sessions-section { display: flex; flex-direction: column; border-top: 1px solid var(--border); min-height: 0; flex-shrink: 0; max-height: 240px; }
  .sessions-section .panel-title { padding: 10px 18px 6px; flex-shrink: 0; }
  #sessions-list { flex: 1; overflow-y: auto; padding: 0 8px 8px; scrollbar-width: thin; scrollbar-color: var(--bg4) transparent; }
  .session-item { display: flex; align-items: center; gap: 6px; padding: 7px 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; margin-bottom: 3px; transition: background 0.15s; }
  .session-item:hover  { background: var(--bg3); }
  .session-item.active { background: var(--bg4); border-color: var(--accent); }
  .session-name { flex: 1; font-size: 12px; color: var(--fg); font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .session-lang { font-size: 10px; color: var(--fg3); font-family: var(--font-mono); }
  .session-del  { flex-shrink: 0; background: none; border: none; color: var(--fg3); cursor: pointer; font-size: 14px; line-height: 1; padding: 2px 4px; border-radius: 4px; transition: color 0.15s; }
  .session-del:hover { color: var(--red); }
  .sessions-empty { font-size: 12px; color: var(--fg3); font-style: italic; padding: 8px 10px; }

  /* ── Right panel (split: analysis + chat) ── */
  .right-panel { display: flex; flex-direction: row; overflow: hidden; background: var(--bg); }

  .analysis-pane {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--border);
  }
  .chat-pane {
    width: 360px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--bg2);
  }
  .resize-handle {
    width: 5px;
    flex-shrink: 0;
    cursor: col-resize;
    background: var(--border);
    transition: background 0.2s;
  }
  .resize-handle:hover, .resize-handle.dragging { background: var(--accent); }
  .pane-header {
    padding: 10px 18px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--fg3);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  /* ── Analysis streaming mode (raw text) ── */
  #analysis-output {
    flex: 1;
    overflow-y: auto;
    padding: 28px 36px;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.8;
    color: var(--fg);
    white-space: pre-wrap;
    word-break: break-word;
    scrollbar-width: thin;
    scrollbar-color: var(--bg4) transparent;
  }
  #analysis-output:empty::before {
    content: "Selecione um repositório e clique em Analisar.";
    color: var(--fg3);
    font-style: italic;
  }

  /* ── Analysis rendered mode (markdown) ── */
  #analysis-output.rendered {
    font-family: var(--font-ui);
    font-size: 14.5px;
    white-space: normal;
  }
  /* Markdown element styles */
  #analysis-output.rendered h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent2);
    margin: 0 0 16px;
    padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
    letter-spacing: -0.3px;
  }
  #analysis-output.rendered h2 {
    font-size: 17px;
    font-weight: 600;
    color: var(--accent3);
    margin: 28px 0 10px;
    padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  #analysis-output.rendered h3 {
    font-size: 14px;
    font-weight: 600;
    color: var(--fg);
    margin: 20px 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  #analysis-output.rendered p {
    margin: 0 0 14px;
    line-height: 1.7;
    color: var(--fg2);
  }
  #analysis-output.rendered ul,
  #analysis-output.rendered ol {
    margin: 0 0 14px 22px;
    color: var(--fg2);
  }
  #analysis-output.rendered li {
    margin-bottom: 5px;
    line-height: 1.65;
  }
  #analysis-output.rendered li::marker { color: var(--accent); }
  #analysis-output.rendered code {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: var(--font-mono);
    font-size: 12.5px;
    color: var(--accent3);
  }
  #analysis-output.rendered pre {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px 20px;
    margin: 0 0 16px;
    overflow-x: auto;
    scrollbar-width: thin;
  }
  #analysis-output.rendered pre code {
    background: none;
    border: none;
    padding: 0;
    color: var(--fg);
    font-size: 13px;
  }
  #analysis-output.rendered blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 0 6px 18px;
    margin: 0 0 14px;
    color: var(--fg3);
    font-style: italic;
  }
  #analysis-output.rendered strong { color: var(--fg); font-weight: 600; }
  #analysis-output.rendered em { color: var(--accent3); }
  #analysis-output.rendered a { color: var(--accent2); text-decoration: underline; }
  #analysis-output.rendered hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 24px 0;
  }
  #analysis-output.rendered table {
    width: 100%;
    border-collapse: collapse;
    margin: 0 0 16px;
    font-size: 13px;
  }
  #analysis-output.rendered th {
    background: var(--bg3);
    color: var(--accent2);
    font-weight: 600;
    padding: 8px 12px;
    text-align: left;
    border: 1px solid var(--border);
  }
  #analysis-output.rendered td {
    padding: 7px 12px;
    border: 1px solid var(--border);
    color: var(--fg2);
  }
  #analysis-output.rendered tr:nth-child(even) td { background: var(--bg2); }

  /* Streaming cursor */
  .cursor {
    display: inline-block;
    width: 8px; height: 14px;
    background: var(--accent);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 0.9s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ── Chat ── */
  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 28px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scrollbar-width: thin;
    scrollbar-color: var(--bg4) transparent;
  }
  #chat-messages:empty::before {
    content: "Analise um repositório para começar o chat.";
    color: var(--fg3);
    font-style: italic;
    font-size: 13px;
  }
  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 82%; }
  .msg.user { align-self: flex-end; }
  .msg.bot  { align-self: flex-start; }
  .msg-label { font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
  .msg.user .msg-label { color: var(--accent3); text-align: right; }
  .msg.bot  .msg-label { color: var(--green); }
  .msg-bubble {
    padding: 11px 15px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg.user .msg-bubble { background: var(--bg4); border: 1px solid var(--accent); color: var(--fg); }
  .msg.bot  .msg-bubble { background: var(--bg2); border: 1px solid var(--border); color: var(--fg); font-family: var(--font-mono); font-size: 13px; white-space: pre-wrap; word-break: break-word; }

  /* Bot bubble em modo markdown renderizado */
  .msg.bot .msg-bubble.rendered {
    font-family: var(--font-ui);
    font-size: 13.5px;
    white-space: normal;
  }
  .msg.bot .msg-bubble.rendered p        { margin: 0 0 10px; line-height: 1.65; color: var(--fg2); }
  .msg.bot .msg-bubble.rendered p:last-child { margin-bottom: 0; }
  .msg.bot .msg-bubble.rendered h1,
  .msg.bot .msg-bubble.rendered h2,
  .msg.bot .msg-bubble.rendered h3      { color: var(--accent3); font-weight: 600; margin: 12px 0 6px; }
  .msg.bot .msg-bubble.rendered h1      { font-size: 15px; }
  .msg.bot .msg-bubble.rendered h2      { font-size: 14px; }
  .msg.bot .msg-bubble.rendered h3      { font-size: 13px; text-transform: uppercase; letter-spacing: 0.4px; }
  .msg.bot .msg-bubble.rendered ul,
  .msg.bot .msg-bubble.rendered ol      { margin: 0 0 10px 18px; color: var(--fg2); }
  .msg.bot .msg-bubble.rendered li      { margin-bottom: 4px; line-height: 1.6; }
  .msg.bot .msg-bubble.rendered li::marker { color: var(--accent); }
  .msg.bot .msg-bubble.rendered code    { background: var(--bg4); border: 1px solid var(--border); border-radius: 4px; padding: 1px 5px; font-family: var(--font-mono); font-size: 12px; color: var(--accent3); }
  .msg.bot .msg-bubble.rendered pre     { background: var(--bg4); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin: 8px 0; overflow-x: auto; }
  .msg.bot .msg-bubble.rendered pre code { background: none; border: none; padding: 0; color: var(--fg); font-size: 12px; }
  .msg.bot .msg-bubble.rendered blockquote { border-left: 3px solid var(--accent); padding-left: 12px; color: var(--fg3); font-style: italic; margin: 8px 0; }
  .msg.bot .msg-bubble.rendered strong  { color: var(--fg); font-weight: 600; }
  .msg.bot .msg-bubble.rendered em      { color: var(--accent3); }
  .msg.bot .msg-bubble.rendered a       { color: var(--accent2); text-decoration: underline; }
  .msg.bot .msg-bubble.rendered hr      { border: none; border-top: 1px solid var(--border); margin: 10px 0; }

  .chat-input-row {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg2);
    flex-shrink: 0;
  }
  #chat-input { flex: 1; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ Deep GitHub Analyzer <span>Groq · GPT-OSS-120B</span></div>
  <div id="status-bar">carregando…</div>
</header>

<main>
  <aside>
    <div class="panel-title">Repositório</div>
    <div class="search-wrap">
      <input id="search-input" type="text" placeholder="Nome, owner/repo ou URL do GitHub…" autocomplete="off">
      <button class="btn" id="search-btn">Buscar</button>
    </div>
    <div id="repo-list"></div>
    <div class="analyze-wrap">
      <button class="btn" id="analyze-btn" disabled>⚡ Analisar repositório</button>
    </div>
    <div class="sessions-section">
      <div class="panel-title">Análises salvas</div>
      <div id="sessions-list"><div class="sessions-empty">Nenhuma análise ainda.</div></div>
    </div>
  </aside>

  <div class="right-panel">
    <div class="analysis-pane" id="pane-analysis">
      <div class="pane-header">📄 Análise</div>
      <div id="analysis-output"></div>
    </div>

    <div class="resize-handle" id="resize-handle"></div>

    <div class="chat-pane" id="pane-chat">
      <div class="pane-header">💬 Chat</div>
      <div id="chat-messages"></div>
      <div class="chat-input-row">
        <input id="chat-input" type="text" placeholder="Pergunte sobre o repositório…" autocomplete="off">
        <button class="btn" id="send-btn" disabled>Enviar</button>
      </div>
    </div>
  </div>
</main>

<script>
// ── State
var repos = [];
var selectedRepo = null;
var streaming = false;
// sessions: { key: { repo, analysis, chatMessages, name, lang } }
var sessions = {};
var currentKey = null;

// ── Init
window.addEventListener('DOMContentLoaded', function() {
  fetch('/env')
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d.ok) setStatus(d.warn, 'err');
      else if (d.warn) setStatus(d.warn, 'warn');
      else setStatus('Pronto. Busque um repositório para começar.', '');
    })
    .catch(function() { setStatus('Erro ao conectar com o servidor.', 'err'); });

  loadSavedAnalyses();

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('analyze-btn').addEventListener('click', doAnalyze);
  document.getElementById('send-btn').addEventListener('click', doChat);
  document.getElementById('search-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') doSearch(); });
  document.getElementById('chat-input').addEventListener('keydown', function(e) { if (e.key === 'Enter') doChat(); });
});

// ── Status
function setStatus(msg, cls) {
  var el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = cls || '';
}

// ── Search
function doSearch() {
  if (streaming) return;
  var q = document.getElementById('search-input').value.trim();
  if (!q) return;

  setStatus('Buscando…', 'warn');
  document.getElementById('repo-list').innerHTML = '';
  document.getElementById('analyze-btn').disabled = true;
  selectedRepo = null;

  fetch('/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: q })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    repos = data;
    if (!repos.length) { setStatus('Nenhum repositório encontrado.', 'err'); return; }
    var list = document.getElementById('repo-list');
    repos.forEach(function(r, i) {
      var div = document.createElement('div');
      div.className = 'repo-item';
      div.innerHTML =
        '<div class="repo-name">' + esc(r.full_name) + '</div>' +
        '<div class="repo-meta"><span class="star">★</span> ' + r.stargazers_count.toLocaleString() +
        (r.language ? ' · ' + esc(r.language) : '') + '</div>' +
        (r.description ? '<div class="repo-desc">' + esc(r.description) + '</div>' : '');
      div.addEventListener('click', function() { selectRepo(i, div); });
      list.appendChild(div);
    });
    setStatus(repos.length + ' repositórios encontrados.', '');
  })
  .catch(function(e) { setStatus('Erro na busca: ' + e.message, 'err'); });
}

function selectRepo(i, el) {
  document.querySelectorAll('.repo-item').forEach(function(d) { d.classList.remove('active'); });
  el.classList.add('active');
  selectedRepo = repos[i];
  setStatus(selectedRepo.full_name + (selectedRepo.description ? ' — ' + selectedRepo.description : ''), '');
  document.getElementById('analyze-btn').disabled = false;
}

// ── Sessions ──────────────────────────────────────────────────────────────────
function loadSavedAnalyses() {
  fetch('/analyses')
    .then(function(r) { return r.json(); })
    .then(function(items) {
      items.forEach(function(item) {
        var key = item.name;
        if (!sessions[key]) {
          // Extrai full_name do cabeçalho do markdown: "# Análise: owner/repo"
          var match = item.content.match(/^#\s+Análise:\s+(.+)$/m);
          var fullName = match ? match[1].trim() : key.replace('-', '/');
          sessions[key] = {
            repo: { full_name: fullName },
            analysis: item.content,
            chatMessages: [],
            name: key,
            fromDisk: true
          };
        }
      });
      renderSessionsList();
    });
}

function renderSessionsList() {
  var list = document.getElementById('sessions-list');
  var keys = Object.keys(sessions);
  if (!keys.length) { list.innerHTML = '<div class="sessions-empty">Nenhuma análise ainda.</div>'; return; }
  list.innerHTML = '';
  keys.forEach(function(key) {
    var s = sessions[key];
    var div = document.createElement('div');
    div.className = 'session-item' + (key === currentKey ? ' active' : '');
    div.dataset.key = key;
    var displayName = (s.repo && s.repo.full_name) ? s.repo.full_name : key;
    div.innerHTML =
      '<div class="session-name" title="' + esc(displayName) + '">' + esc(displayName) + '</div>' +
      '<button class="session-del" title="Excluir">✕</button>';
    div.querySelector('.session-del').addEventListener('click', function(e) {
      e.stopPropagation();
      deleteSession(key);
    });
    div.addEventListener('click', function() { activateSession(key); });
    list.appendChild(div);
  });
}

function activateSession(key) {
  // Não troca de sessão durante streaming
  if (streaming) return;
  currentKey = key;
  var s = sessions[key];

  // Garante mensagem de sistema isolada por sessão
  if (s.chatMessages.length === 0 && s.analysis) {
    var repoName = (s.repo && s.repo.full_name) ? s.repo.full_name : key;
    s.chatMessages = [{
      role: 'system',
      content: 'Você é um assistente técnico especialista em repositórios GitHub. ' +
               'Responda APENAS sobre o repositório ' + repoName + '.' +
               '\n\nAnálise deste repositório:\n' + s.analysis
    }];
  }

  var out = document.getElementById('analysis-output');
  out.classList.add('rendered');
  out.innerHTML = marked.parse(s.analysis);
  out.scrollTop = 0;

  // Restaura histórico de chat desta sessão
  var msgs = document.getElementById('chat-messages');
  msgs.innerHTML = '';
  s.chatMessages.forEach(function(m) {
    if (m.role === 'user') appendBubble('user', 'Você', m.content);
    if (m.role === 'assistant') {
      var b = appendBubble('bot', 'Assistente', '');
      b.querySelector('.msg-bubble').classList.add('rendered');
      b.querySelector('.msg-bubble').innerHTML = marked.parse(m.content);
    }
  });

  // Habilita chat se houver análise
  document.getElementById('send-btn').disabled = !s.analysis;
  setStatus('📂  ' + ((s.repo && s.repo.full_name) || key), '');
  renderSessionsList();
}

function deleteSession(key) {
  fetch('/analyses/' + encodeURIComponent(key), { method: 'DELETE' });
  delete sessions[key];
  if (currentKey === key) {
    currentKey = null;
    document.getElementById('analysis-output').classList.remove('rendered');
    document.getElementById('analysis-output').textContent = '';
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('send-btn').disabled = true;
  }
  renderSessionsList();
}

// ── Analyze
function doAnalyze() {
  if (!selectedRepo || streaming) return;
  streaming = true;
  setStatus('Analisando…', 'warn');

  currentKey = selectedRepo.full_name.replace('/', '-');
  sessions[currentKey] = { repo: selectedRepo, analysis: '', chatMessages: [], name: currentKey };
  renderSessionsList();

  var out = document.getElementById('analysis-output');
  out.classList.add('rendered');
  out.innerHTML = '';
  document.getElementById('chat-messages').innerHTML = '';

  var tokenQueue = [], accText = '', sseComplete = false, drainTimer = null;

  var renderTimer = setInterval(function() {
    if (accText) {
      out.innerHTML = marked.parse(accText) + '<span class="cursor"></span>';
      out.scrollTop = out.scrollHeight;
    }
  }, 80);

  function drainChars() {
    if (tokenQueue.length > 0) {
      accText += tokenQueue.shift();
      drainTimer = setTimeout(drainChars, 20);
    } else if (sseComplete) {
      clearInterval(renderTimer);
      streaming = false;
      out.innerHTML = marked.parse(sessions[currentKey].analysis);
      out.scrollTop = 0;
      sessions[currentKey].chatMessages = [{
        role: 'system',
        content: 'Você é um assistente técnico especialista em repositórios GitHub. Acabou de analisar ' +
                 selectedRepo.full_name + '.\n\nAnálise inicial:\n' + sessions[currentKey].analysis
      }];
      document.getElementById('send-btn').disabled = false;
      setStatus('✅ Análise concluída — use o Chat para perguntas.', 'ok');
      renderSessionsList();
    } else {
      drainTimer = null;
    }
  }

  fetch('/analyze', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(selectedRepo)
  })
  .then(function(res) {
    return readSSE(res, function(evt) {
      if (evt.type === 'status') {
        if (evt.data) setStatus(evt.data, 'ok');
      } else if (evt.type === 'error') {
        throw new Error(evt.data);
      } else if (evt.type === 'token') {
        sessions[currentKey].analysis += evt.data;
        evt.data.split('').forEach(function(ch) { tokenQueue.push(ch); });
        if (!drainTimer) drainChars();
      }
    });
  })
  .then(function() {
    sseComplete = true;
    if (!drainTimer) drainChars();
  })
  .catch(function(e) {
    clearInterval(renderTimer);
    if (drainTimer) { clearTimeout(drainTimer); drainTimer = null; }
    streaming = false;
    setStatus('Erro na análise: ' + e.message, 'err');
  });
}

// ── Chat
function doChat() {
  if (streaming || !currentKey || !sessions[currentKey] || !sessions[currentKey].analysis) return;
  var input = document.getElementById('chat-input');
  var text = input.value.trim();
  if (!text) return;

  var sessionKey = currentKey;
  var sess = sessions[sessionKey];

  input.value = '';
  streaming = true;
  document.getElementById('send-btn').disabled = true;

  sess.chatMessages.push({ role: 'user', content: text });
  appendBubble('user', 'Você', text);

  var botDiv = appendBubble('bot', 'Assistente', '');
  var botBubble = botDiv.querySelector('.msg-bubble');
  botBubble.classList.add('rendered');

  var reply = '', tokenQueue = [], accText = '', sseComplete = false, drainTimer = null;

  var renderTimer = setInterval(function() {
    if (accText) {
      botBubble.innerHTML = marked.parse(accText) + '<span class="cursor"></span>';
      document.getElementById('chat-messages').scrollTop = 99999;
    }
  }, 80);

  function drainChars() {
    if (tokenQueue.length > 0) {
      accText += tokenQueue.shift();
      drainTimer = setTimeout(drainChars, 8);
    } else if (sseComplete) {
      clearInterval(renderTimer);
      botBubble.innerHTML = marked.parse(reply);
      sessions[sessionKey].chatMessages.push({ role: 'assistant', content: reply });
      streaming = false;
      document.getElementById('send-btn').disabled = false;
      input.focus();
    } else {
      drainTimer = null;
    }
  }

  fetch('/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ messages: sess.chatMessages, repo: sess.repo })
  })
  .then(function(res) {
    return readSSE(res, function(evt) {
      if (evt.type === 'status') {
        if (evt.data) setStatus(evt.data, 'ok');
      } else if (evt.type === 'error') {
        throw new Error(evt.data);
      } else if (evt.type === 'token') {
        reply += evt.data;
        evt.data.split('').forEach(function(ch) { tokenQueue.push(ch); });
        if (!drainTimer) drainChars();
      }
    });
  })
  .then(function() {
    sseComplete = true;
    if (!drainTimer) drainChars();
  })
  .catch(function(e) {
    clearInterval(renderTimer);
    if (drainTimer) { clearTimeout(drainTimer); drainTimer = null; }
    streaming = false;
    document.getElementById('send-btn').disabled = false;
    setStatus('Erro no chat: ' + e.message, 'err');
  });
}

function appendBubble(role, label, text) {
  var msgs = document.getElementById('chat-messages');
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerHTML = '<div class="msg-label">' + label + '</div>' +
                  '<div class="msg-bubble">' + esc(text) + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function esc(t) {
  return String(t)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

// ── Resize handle
(function() {
  var handle = document.getElementById('resize-handle');
  var chatPane = document.getElementById('pane-chat');
  var dragging = false, startX = 0, startW = 0;

  handle.addEventListener('mousedown', function(e) {
    dragging = true;
    startX = e.clientX;
    startW = chatPane.offsetWidth;
    handle.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', function(e) {
    if (!dragging) return;
    var newW = Math.min(Math.max(startW + (startX - e.clientX), 200), 700);
    chatPane.style.width = newW + 'px';
  });
  document.addEventListener('mouseup', function() {
    if (!dragging) return;
    dragging = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

// ── SSE reader
function readSSE(res, onToken) {
  var reader = res.body.getReader();
  var dec = new TextDecoder();
  var buf = '';

  function pump() {
    return reader.read().then(function(result) {
      if (result.done) return;
      buf += dec.decode(result.value, { stream: true });
      var lines = buf.split('\n');
      buf = lines.pop();
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (!line.startsWith('data: ')) continue;
        var d = line.slice(6);
        if (d === '[DONE]') return;
        var parsed;
        try { parsed = JSON.parse(d); } catch(e) { continue; }
        onToken(parsed);
      }
      return pump();
    });
  }
  return pump();
}
